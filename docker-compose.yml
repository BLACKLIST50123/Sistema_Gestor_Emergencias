# =========================================================
# QUÉ HACE ESTE ARCHIVO (en simple)
# =========================================================
# Este archivo prende las 4 bases de datos del proyecto (Postgres,
# Oracle, Cassandra y MongoDB), cada una en su propio contenedor,
# con un solo comando: "docker compose up -d". Postgres y Oracle se
# llenan solas con su schema y seed la primera vez que arrancan 
# Cassandra y MongoDB NO se auto-inicializan, por eso hay que correr después el
# script init-db.sh (en sus casos los comandos cmd del archivo PRIMER ARRANQUE) 
# para cargarles sus tablas y datos.
#
# =========================================================
# Levanta las 4 bases de datos del SGE con un solo comando:
#   docker compose up -d
# =========================================================

services:

  postgres:
    image: postgres:16
    container_name: sge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sge_usuarios_recursos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/postgres/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./db/postgres/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql

  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: sge_oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: sge_user
      APP_USER_PASSWORD: oracle
    ports:
      - "1521:1521"
    volumes:
      - ora_data:/opt/oracle/oradata
      - ./db/oracle/schema.sql:/container-entrypoint-initdb.d/1_schema.sql
      - ./db/oracle/seed.sql:/container-entrypoint-initdb.d/2_seed.sql

  cassandra:
    image: cassandra:4.1
    container_name: sge_cassandra
    restart: unless-stopped
    environment:
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    ports:
      - "9042:9042"
    volumes:
      - cas_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 15s
      timeout: 10s
      retries: 10
  
  mongodb:
    image: mongo:7
    container_name: sge_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  pg_data:
  ora_data:
  cas_data:
  mongo_data:
